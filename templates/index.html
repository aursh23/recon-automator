<!DOCTYPE html>
<html>
<head>
    <title>Recon Tool</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1e1e2f; color: #eee; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #2a2a3d; padding: 40px; border-radius: 10px; width: 400px; text-align: center; }
        input[type=text] { width: 90%; padding: 10px; margin: 15px 0; border-radius: 5px; border: none; }
        button { padding: 10px 25px; background: #4e8cff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #3a6fd6; }
        .error { color: #ff6b6b; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Recon Tool</h2>
        <p>Enter a URL or IP address to scan</p>
        <form action="/scan" method="POST">
            <input type="text" name="target" placeholder="e.g. example.com or 8.8.8.8" required>
            <br>
            <button type="submit">Run Recon</button>
        </form>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
